<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelAI | Client Node</title>
    <style>
        :root {
            --bg: #050816;
            --surface: #0A101F;
            --primary: #22D3EE;
            --primary-glow: rgba(34, 211, 238, 0.3);
            --danger: #FF3B3B;
            --warning: #FFD600;
            --success: #00FF9C;
            --text: #F8FAFC;
            --text-dim: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        body {
            margin: 0;
            padding: 0;
            width: 320px;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .scan-line {
            position: fixed;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.03), transparent);
            pointer-events: none;
            z-index: 100;
            animation: scanline 4s linear infinite;
        }

        #sentinel-app {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--primary-glow);
            border: 1px solid var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .brand h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .brand span {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            font-weight: 700;
            opacity: 0.6;
        }

        /* RISK CENTER */
        .risk-center {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .risk-gauge {
            width: 120px;
            height: 120px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-svg {
            transform: rotate(-90deg);
        }

        .gauge-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .risk-value {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        .risk-value .score {
            font-size: 32px;
            font-weight: 900;
            font-family: monospace;
        }

        .risk-value .label {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: 800;
            opacity: 0.4;
            margin-top: 4px;
        }

        .threat-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .threat-badge.critical { background: rgba(255, 59, 59, 0.1); color: var(--danger); border-color: rgba(255, 59, 59, 0.2); }
        .threat-badge.warning { background: rgba(255, 214, 0, 0.1); color: var(--warning); border-color: rgba(255, 214, 0, 0.2); }
        .threat-badge.safe { background: rgba(0, 255, 156, 0.1); color: var(--success); border-color: rgba(0, 255, 156, 0.2); }

        /* AGENTIC STEPS */
        .agent-stepper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .step.active {
            opacity: 1;
            background: rgba(34, 211, 238, 0.05);
            border-color: var(--primary-glow);
            animation: pulse 2s infinite;
        }

        .step.done {
            opacity: 1;
            border-color: rgba(0, 255, 156, 0.2);
        }

        .step-icon {
            width: 6px;
            height: 6px;
            border-radius: 1px;
            background: var(--text-dim);
            transition: all 0.3s ease;
        }

        .step.active .step-icon { background: var(--primary); box-shadow: 0 0 8px var(--primary); border-radius: 50%; }
        .step.done .step-icon { background: var(--success); border-radius: 50%; }

        .step-text {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ACTIONS */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
            border: none;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 211, 238, 0.3);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            font-size: 8px;
            color: var(--text-dim);
            opacity: 0.3;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div id="sentinel-app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div class="brand">
                    <h1>SentinelAI</h1>
                    <span>Operational Uplink</span>
                </div>
            </div>
            <div id="connection-status" class="step-icon" style="background: var(--success); width: 8px; height: 8px;"></div>
        </div>

        <!-- RISK CORE -->
        <div class="risk-center">
            <div class="risk-gauge">
                <svg class="gauge-svg" width="120" height="120">
                    <circle class="gauge-track" cx="60" cy="60" r="45"></circle>
                    <circle id="riskFill" class="gauge-fill" cx="60" cy="60" r="45"></circle>
                </svg>
                <div class="risk-value">
                    <span id="riskScore" class="score">00</span>
                    <span class="label">Exposure %</span>
                </div>
            </div>
            <div id="threatLevel" class="threat-badge">Monitoring...</div>
        </div>

        <!-- AGENTIC STEPS -->
        <div id="aiSteps" class="agent-stepper" style="display: none;">
            <div id="step1" class="step">
                <div class="step-icon"></div>
                <span class="step-text">Collecting Intel</span>
            </div>
            <div id="step2" class="step">
                <div class="step-icon"></div>
                <span class="step-text">Analyzing DOM</span>
            </div>
            <div id="step3" class="step">
                <div class="step-icon"></div>
                <span class="step-text">Neural Synthesis</span>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="actions">
            <button id="scanBtn" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                Commence Audit
            </button>
            <button id="dashboardBtn" class="btn btn-outline">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                Full Operations
            </button>
        </div>

        <div class="footer">Encrypted Administrative Channel v2.4.0</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
